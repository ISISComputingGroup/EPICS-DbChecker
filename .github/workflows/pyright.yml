name: Ruff
on: [push, pull_request]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install pyright
        run: pip install pyright
      - name: install diff_cover
        run: pip install diff_cover
      - name: install pyright_plugin
        run: pip install pyright_diff_quality_plugin@git+https://github.com/DiamondLightSource/pyright_diff_quality_plugin.git@77fc0819e708eb16ffdcaea06552a2804294b53e
      - name: Run Pyright on changes
        run: diff-quality --violations=pyright --compare-branch origin/master